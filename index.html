<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Dinge, bei denen Aaron kacke gebaut hat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getDatabase, ref, push, onValue, remove
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
  	apiKey: "AIzaSyBKmxkraZdx6MeF_cjB2lsrwycOeeIIujo",
  	authDomain: "aaron-kacke-counter.firebaseapp.com",
  	databaseURL: "https://aaron-kacke-counter-default-rtdb.europe-west1.firebasedatabase.app",
  	projectId: "aaron-kacke-counter",
  	storageBucket: "aaron-kacke-counter.firebasestorage.app",
  	messagingSenderId: "600093071909",
  	appId: "1:600093071909:web:e49042eb9715eac684bdcc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const entriesRef = ref(db, "aaron_entries");

    let entries = {};
    let chart;

    onValue(entriesRef, snapshot => {
      entries = snapshot.val() || {};
      updateView();
    });

    window.addEntry = function () {
      const thema = document.getElementById("thema").value.trim();
      const by = document.getElementById("by").value.trim();
      if (!thema || !by) return;

      push(entriesRef, {
        thema,
        by,
        time: Date.now()
      });

      document.getElementById("thema").value = "";
    };

    window.deleteEntry = function (id) {
      remove(ref(db, `aaron_entries/${id}`));
    };

    function updateView() {
      const list = Object.entries(entries);
      document.getElementById("counter").textContent = list.length;

      const tbody = document.getElementById("entries");
      tbody.innerHTML = "";

      const byCount = {}, themeCount = {};

      list.reverse().forEach(([id, e], i) => {
        byCount[e.by] = (byCount[e.by] || 0) + 1;
        themeCount[e.thema] = (themeCount[e.thema] || 0) + 1;

        tbody.innerHTML += `
          <tr>
            <td>${list.length - i}</td>
            <td>${e.thema}</td>
            <td>${e.by}</td>
            <td>${new Date(e.time).toLocaleString("de-DE")}</td>
            <td><button onclick="deleteEntry('${id}')">🗑️</button></td>
          </tr>`;
      });

      updateChart(themeCount);
      updateStats(byCount);
    }

    function updateStats(byCount) {
      const sorted = Object.entries(byCount).sort((a,b)=>b[1]-a[1]);
      document.getElementById("stats").innerHTML =
        sorted[0]
          ? `Aktivster Melder: <b>${sorted[0][0]}</b> (${sorted[0][1]}×)`
          : "Noch keine Einträge.";
    }

    function updateChart(themeCount) {
      if (chart) chart.destroy();
      chart = new Chart(document.getElementById("chart"), {
        type: "bar",
        data: {
          labels: Object.keys(themeCount),
          datasets: [{
            data: Object.values(themeCount),
            backgroundColor: "#ff6363"
          }]
        },
        options: { plugins: { legend: { display: false } } }
      });
    }
  </script>

  <style>
    body { font-family: Arial; background: #f7f7fb; }
    .box {
      max-width: 650px; margin: 30px auto; padding: 30px;
      background: white; border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.1);
    }
    input, button { padding: 10px; margin: 5px 0; width: 100%; }
    table { width: 100%; border-collapse: collapse; }
    td, th { border: 1px solid #eee; padding: 6px; }
  </style>
</head>

<body>
  <div class="box">
    <h1>Dinge, bei denen Aaron kacke gebaut hat</h1>
    <div id="counter" style="font-size:3em;color:#ff6363">0</div>

    <input id="by" placeholder="Wer trägt es ein?">
    <input id="thema" placeholder="Was ist passiert?">
    <button onclick="addEntry()">Eintrag hinzufügen</button>

    <div id="stats"></div>
    <canvas id="chart"></canvas>

    <table>
      <thead>
        <tr><th>#</th><th>Thema</th><th>Von</th><th>Zeit</th><th></th></tr>
      </thead>
      <tbody id="entries"></tbody>
    </table>
  </div>
</body>
</html>
